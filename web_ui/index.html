<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>user/htpk-builder - App Compiler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', '"Noto Sans"', 'Helvetica', 'Arial', 'sans-serif', '"Apple Color Emoji"', '"Segoe UI Emoji"'],
                        mono: ['ui-monospace', 'SFMono-Regular', '"SF Mono"', 'Menlo', 'Consolas', '"Liberation Mono"', 'monospace'],
                    },
                    colors: {
                        gh: {
                            bg: '#0d1117',
                            panel: '#161b22',
                            border: '#30363d',
                            text: '#c9d1d9',
                            muted: '#8b949e',
                            link: '#58a6ff',
                            green: '#238636',
                            greenHover: '#2ea043',
                            danger: '#da3633',
                            inputBg: '#010409',
                            header: '#010409'
                        }
                    }
                }
            }
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gh-bg text-gh-text text-[14px] min-h-screen antialiased flex flex-col" x-data="htpkBuilder()">

    <div class="bg-gh-header pt-4 border-b border-gh-border">
        <div class="px-4 md:px-8 mb-4 flex items-center justify-between">
            <div class="flex items-center gap-2 text-[22px]">
                <span class="text-white font-bold tracking-tight">htpk</span>
            </div>
            <button type="button" @click="alert('Sign in not implemented')"
                class="bg-white text-[#0d1117] px-4 py-1.5 rounded-[6px] text-[13px] font-bold hover:bg-[#f0f0f0] transition-all flex items-center gap-2 shadow-sm">
                <svg height="18" viewBox="0 0 16 16" width="18" class="fill-current">
                    <path
                        d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z">
                    </path>
                </svg>
                Sign in with GitHub
            </button>
        </div>

        <div class="px-4 md:px-8 flex gap-8 text-[14px]">
            <div
                class="border-b-2 border-[#f78166] pb-2 font-semibold flex items-center gap-2 text-gh-text cursor-pointer">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                Converter
            </div>
            <div class="pb-2 flex items-center gap-2 text-gh-muted hover:text-gh-text cursor-pointer transition-colors">
                <i data-lucide="history" class="w-4 h-4"></i>
                History
            </div>
            <div class="pb-2 flex items-center gap-2 text-gh-muted hover:text-gh-text cursor-pointer transition-colors">
                <i data-lucide="info" class="w-4 h-4"></i>
                About
            </div>
            <div class="pb-2 flex items-center gap-2 text-gh-muted hover:text-gh-text cursor-pointer transition-colors">
                <i data-lucide="credit-card" class="w-4 h-4"></i>
                Pricing
            </div>
        </div>
    </div>

    <div class="max-w-[896px] w-full mx-auto px-4 md:px-8 py-8 flex-1">

        <form @submit.prevent="submitBuild" class="border border-gh-border rounded-md shadow-sm bg-gh-bg mb-6">

            <div class="bg-gh-panel border-b border-gh-border flex items-center rounded-t-md px-6">
                <button type="button" @click="sourceType = 'git'"
                    :class="sourceType === 'git' ? 'text-white font-bold' : 'text-gh-muted hover:text-gh-text'"
                    class="px-4 py-2 text-[13px] transition whitespace-nowrap">
                    Git
                </button>
                <button type="button" @click="sourceType = 'dist'"
                    :class="sourceType === 'dist' ? 'text-[#ff7b72] font-bold' : 'text-[#ff7b72]/60 hover:text-[#ff7b72]'"
                    class="px-4 py-2 text-[13px] transition whitespace-nowrap">
                    Dist Folder
                </button>
                <button type="button" @click="sourceType = 'file'"
                    :class="sourceType === 'file' ? 'text-white font-bold' : 'text-gh-muted hover:text-gh-text'"
                    class="px-4 py-2 text-[13px] transition whitespace-nowrap">
                    ZIP File
                </button>
                <button type="button" @click="sourceType = 'url'"
                    :class="sourceType === 'url' ? 'text-white font-bold' : 'text-gh-muted hover:text-gh-text'"
                    class="px-4 py-2 text-[13px] transition whitespace-nowrap">
                    URL
                </button>
            </div>

            <div class="p-6 space-y-6">

                <div x-show="sourceType === 'git'" class="space-y-6">

                    <div class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4">
                        <label class="font-semibold flex items-center gap-2 shrink-0 sm:w-40">
                            Repository URL
                        </label>
                        <div class="flex-1 relative group">
                            <i data-lucide="link-2"
                                class="absolute left-2.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gh-muted group-focus-within:text-gh-link transition-colors pointer-events-none"></i>
                            <input type="url" x-model="gitUrl"
                                class="w-full bg-gh-bg border border-gh-border rounded-[6px] pl-8 pr-3 py-1.5 focus:outline-none focus:ring-1 focus:ring-gh-link focus:border-gh-link transition shadow-sm font-mono text-sm"
                                placeholder="https://github.com/user/repo" />
                        </div>
                    </div>


                    <div class="flex flex-wrap items-center gap-x-12 gap-y-4 pt-2 mb-4">
                        <div class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4 flex-1 sm:flex-none">
                            <label class="font-semibold flex items-center gap-2 shrink-0 sm:w-40 text-gh-text">
                                Branch
                                <span x-show="isLoadingBranches"
                                    class="animate-spin h-3 w-3 border-2 border-gh-link border-t-transparent rounded-full ml-1"></span>
                            </label>

                            <div
                                class="relative inline-flex items-center hover:bg-[#30363d] focus-within:bg-[#30363d] transition-colors rounded-[6px] bg-gh-bg border border-gh-border shadow-sm group">
                                <i data-lucide="git-branch"
                                    class="absolute left-2.5 w-4 h-4 text-gh-muted group-hover:text-gh-text transition-colors pointer-events-none"></i>
                                <select x-model="gitBranch" @change="fetchCommits()" :disabled="branches.length === 0"
                                    class="w-auto min-w-[120px] max-w-[250px] bg-transparent pl-8 pr-8 py-1.5 outline-none text-[13px] font-semibold text-gh-text appearance-none cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed text-ellipsis">
                                    <template x-if="branches.length === 0">
                                        <option value="main">main</option>
                                    </template>
                                    <template x-for="branch in branches" :key="branch">
                                        <option :value="branch" x-text="branch"></option>
                                    </template>
                                </select>
                                <i data-lucide="chevron-down"
                                    class="absolute right-2.5 h-4 w-4 text-gh-muted group-hover:text-gh-text transition-colors pointer-events-none"></i>
                            </div>
                        </div>

                        <div class="flex items-center gap-2 sm:gap-4 flex-1 sm:flex-none ml-0 sm:ml-4">
                            <label
                                class="font-semibold flex items-center gap-2 shrink-0 whitespace-nowrap text-gh-text">
                                Entry Point
                                <span x-show="isLoadingFiles"
                                    class="animate-spin h-3 w-3 border-2 border-gh-link border-t-transparent rounded-full ml-1"></span>
                            </label>

                            <div
                                class="relative inline-flex items-center hover:bg-[#30363d] focus-within:bg-[#30363d] transition-colors rounded-[6px] bg-gh-bg border border-gh-border shadow-sm group">
                                <i data-lucide="file-code"
                                    class="absolute left-2.5 w-4 h-4 text-gh-muted group-hover:text-gh-text transition-colors pointer-events-none"></i>
                                <select x-model="gitEntry" :disabled="htmlFiles.length === 0"
                                    class="w-auto min-w-[120px] max-w-[250px] bg-transparent pl-8 pr-8 py-1.5 outline-none text-[13px] font-semibold text-gh-text appearance-none cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed text-ellipsis">
                                    <template x-if="htmlFiles.length === 0">
                                        <option value="index.html">index.html</option>
                                    </template>
                                    <template x-for="file in htmlFiles" :key="file">
                                        <option :value="file" x-text="file"></option>
                                    </template>
                                </select>
                                <i data-lucide="chevron-down"
                                    class="absolute right-2.5 h-4 w-4 text-gh-muted group-hover:text-gh-text transition-colors pointer-events-none"></i>
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col sm:flex-row sm:items-start gap-2 sm:gap-4 pt-2">
                        <label class="font-semibold shrink-0 sm:w-40 pt-1.5">
                            App Update Mode
                        </label>

                        <div class="flex-1 space-y-2">
                            <div class="flex items-center gap-2">
                                <button type="button" @click="liveApp = true"
                                    :class="liveApp ? 'bg-gh-link/10 text-gh-link border-gh-link' : 'bg-gh-bg text-gh-text border-gh-border hover:border-gh-muted hover:bg-gh-panel'"
                                    class="flex items-center gap-2 px-3 py-1.5 rounded-[6px] border transition-colors text-[13px] font-semibold">
                                    <i data-lucide="radio" class="w-4 h-4"
                                        :class="liveApp ? 'text-gh-link' : 'text-gh-muted'"></i>
                                    Live App
                                </button>
                                <button type="button" @click="liveApp = false; gitCommit = ''"
                                    :class="!liveApp ? 'bg-gh-link/10 text-gh-link border-gh-link' : 'bg-gh-bg text-gh-text border-gh-border hover:border-gh-muted hover:bg-gh-panel'"
                                    class="flex items-center gap-2 px-3 py-1.5 rounded-[6px] border transition-colors text-[13px] font-semibold">
                                    <i data-lucide="git-commit" class="w-4 h-4"
                                        :class="!liveApp ? 'text-gh-link' : 'text-gh-muted'"></i>
                                    Pinned Commit
                                </button>
                            </div>

                            <template x-if="liveApp">
                                <p class="text-[12px] text-gh-muted mt-1">
                                    Users get the latest site content when the repo updates.
                                </p>
                            </template>

                            <template x-if="!liveApp">
                                <div class="space-y-3 mt-1">
                                    <p class="text-[12px] text-gh-muted">
                                        The APK is locked to a specific commit and will not update automatically.
                                    </p>
                                    <div class="flex items-center gap-3">
                                        <label class="text-[13px] font-semibold text-gh-text flex items-center gap-2">
                                            Commit
                                            <span x-show="isLoadingCommits"
                                                class="animate-spin h-3 w-3 border-2 border-gh-link border-t-transparent rounded-full"></span>
                                        </label>
                                        <div
                                            class="relative inline-flex items-center hover:bg-[#30363d] focus-within:bg-[#30363d] transition-colors rounded-[6px] bg-gh-bg border border-gh-border shadow-sm group">
                                            <i data-lucide="git-commit"
                                                class="absolute left-2.5 w-4 h-4 text-gh-muted group-hover:text-gh-text transition-colors pointer-events-none"></i>
                                            <select x-model="gitCommit" @change="fetchHtmlFiles()"
                                                class="w-auto min-w-[120px] max-w-[250px] bg-transparent pl-8 pr-8 py-1.5 outline-none text-[13px] font-semibold text-gh-text appearance-none cursor-pointer text-ellipsis">
                                                <option value="">Latest (HEAD)</option>
                                                <template x-for="commit in commits" :key="commit.sha">
                                                    <option :value="commit.sha"
                                                        x-text="commit.shortSha + ' - ' + commit.message"></option>
                                                </template>
                                            </select>
                                            <i data-lucide="chevron-down"
                                                class="absolute right-2.5 h-4 w-4 text-gh-muted group-hover:text-gh-text transition-colors pointer-events-none"></i>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <div x-show="sourceType === 'dist'" class="pt-1 bg-gh-panel p-4 rounded-md border border-[#ff7b72]">
                    <label class="block font-semibold mb-2 text-[#ff7b72]">Select Build Directory
                        <span
                            class="ml-2 inline-block text-[10px] px-1.5 py-0.5 rounded border border-[#ff7b72] text-[#ff7b72] align-middle">UNIMPLEMENTED</span>
                    </label>
                    <input type="file" webkitdirectory directory multiple @change="distFiles = $event.target.files"
                        class="w-full text-sm text-[#ff7b72] file:mr-4 file:py-1.5 file:px-3 file:rounded-[6px] file:border file:border-[#ff7b72] file:text-sm file:font-semibold file:bg-[rgba(218,54,51,0.16)] file:text-[#ff7b72] hover:file:bg-[rgba(218,54,51,0.25)] cursor-pointer" />
                    <p class="text-[12px] text-[#ff7b72] mt-2">No backend integration yet. Build action will stop
                        locally.</p>
                    <p class="text-[12px] text-gh-muted mt-2">Select your project's compiled <code
                            class="bg-gh-bg px-1.5 py-0.5 rounded-[6px] border border-gh-border font-mono text-[11px]">dist</code>
                        or <code
                            class="bg-gh-bg px-1.5 py-0.5 rounded-[6px] border border-gh-border font-mono text-[11px]">build</code>
                        folder containing the <code
                            class="bg-gh-bg px-1.5 py-0.5 rounded-[6px] border border-gh-border font-mono text-[11px]">index.html</code>.
                    </p>
                </div>

                <div x-show="sourceType === 'file'" class="pt-1 bg-gh-panel p-4 rounded-md border border-gh-border">
                    <label class="block font-semibold mb-2">Upload Archive</label>
                    <input type="file" accept=".zip" @change="zipFile = $event.target.files[0]"
                        class="w-full text-sm text-gh-muted file:mr-4 file:py-1.5 file:px-3 file:rounded-[6px] file:border-0 file:text-sm file:font-semibold file:bg-gh-border file:text-gh-text hover:file:bg-[#3d444d] cursor-pointer" />
                    <p class="text-[12px] text-gh-muted mt-2">Must contain an entry <code
                            class="bg-gh-bg px-1.5 py-0.5 rounded-[6px] border border-gh-border font-mono text-[11px]">index.html</code>
                        at the root.</p>
                </div>

                <div x-show="sourceType === 'url'" class="pt-1 bg-gh-panel p-4 rounded-md border border-gh-border">
                    <label class="block font-semibold mb-1.5">Website URL</label>
                    <input type="url" x-model="mainUrl"
                        class="w-full bg-gh-bg border border-gh-border rounded-[6px] px-3 py-1.5 focus:outline-none focus:ring-1 focus:ring-gh-link focus:border-gh-link transition shadow-sm font-mono text-sm"
                        placeholder="https://example.com" />
                </div>

                <div class="pt-2">
                    <hr class="border-gh-border/30 mb-8 mx-1" />
                    <div class="space-y-6">
                        <div class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4">
                            <label class="font-semibold shrink-0 sm:w-40 text-gh-text">
                                App ID
                            </label>
                            <input type="text" x-model="appId" required pattern="[a-z][a-z0-9_]*"
                                class="flex-1 bg-gh-bg border border-gh-border rounded-[6px] px-3 py-1.5 focus:outline-none focus:ring-1 focus:ring-gh-link focus:border-gh-link transition shadow-sm font-mono text-sm text-gh-text"
                                placeholder="my_app" />
                        </div>

                        <div class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4">
                            <label class="font-semibold shrink-0 sm:w-40 text-gh-text">
                                App Name
                            </label>
                            <input type="text" x-model="appName" required
                                class="flex-1 bg-gh-bg border border-gh-border rounded-[6px] px-3 py-1.5 focus:outline-none focus:ring-1 focus:ring-gh-link focus:border-gh-link transition shadow-sm text-sm text-gh-text"
                                placeholder="My App" />
                        </div>

                        <div class="flex flex-col sm:flex-row sm:items-start gap-2 sm:gap-4">
                            <label class="font-semibold shrink-0 sm:w-40 pt-2 text-gh-text">
                                App Icon
                            </label>
                            <div class="flex-1 flex flex-col md:flex-row md:items-center justify-between gap-6">
                                <div class="flex items-center gap-4">
                                    <div class="relative group shrink-0">
                                        <label
                                            class="cursor-pointer flex items-center justify-center w-12 h-12 rounded-full border border-gh-border bg-gh-bg hover:bg-gh-panel transition-colors overflow-hidden">
                                            <template x-if="!iconPreview">
                                                <i data-lucide="upload"
                                                    class="w-5 h-5 text-gh-muted group-hover:text-gh-text transition-colors"></i>
                                            </template>
                                            <template x-if="iconPreview">
                                                <img :src="iconPreview" class="w-full h-full object-cover" />
                                            </template>
                                            <input type="file" accept="image/png,image/svg+xml" class="hidden"
                                                @change="handleIconFile($event)" />
                                        </label>
                                        <template x-if="iconPreview">
                                            <button type="button"
                                                @click="iconFile = null; iconPreview = null; iconFileName = '.PNG (ideally 512x512) or .SVG'"
                                                class="absolute -top-1 -right-1 bg-gh-danger text-white rounded-full p-0.5 shadow-md border border-gh-border">
                                                <svg class="w-3 h-3" fill="none" stroke="currentColor"
                                                    viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round"
                                                        stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                                                </svg>
                                            </button>
                                        </template>
                                    </div>
                                    <span class="text-sm text-gh-muted truncate max-w-[200px]"
                                        x-text="iconFileName || '.PNG or .SVG'"></span>
                                </div>

                                <button type="submit" :disabled="building"
                                    class="bg-gh-green hover:bg-gh-greenHover disabled:bg-gh-green/50 disabled:cursor-not-allowed text-white py-2 px-8 rounded-[6px] font-bold transition shadow-sm text-[14px] border border-[rgba(255,255,255,0.1)] flex items-center gap-2 h-fit">
                                    <span x-show="!building">Build APK</span>
                                    <span x-show="building" class="flex items-center gap-2">
                                        <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg"
                                            fill="none" viewBox="0 0 24 24">
                                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                                stroke-width="4"></circle>
                                            <path class="opacity-75" fill="currentColor"
                                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                            </path>
                                        </svg>
                                        Compiling...
                                    </span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </form>

        <div x-show="status" class="mb-6 p-4 rounded-md border text-[13px] font-semibold flex items-center shadow-sm"
            :class="statusType === 'error' ? 'bg-[rgba(255,123,114,0.1)] border-[rgba(255,123,114,0.4)] text-[#ff7b72]' : 'bg-[rgba(46,160,67,0.1)] border-[rgba(46,160,67,0.4)] text-gh-green'"
            x-text="status" x-transition>
        </div>

        <div x-show="building" class="border border-gh-border rounded-md bg-gh-bg overflow-hidden" x-transition>
            <div
                class="bg-gh-panel border-b border-gh-border p-3 text-[13px] font-semibold flex items-center gap-2 text-gh-text">
                <svg class="animate-spin h-3.5 w-3.5 text-[#d29922]" xmlns="http://www.w3.org/2000/svg" fill="none"
                    viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
                Build Workflow run
            </div>
            <div class="p-4 bg-[#0d1117] font-mono text-[12px] text-gh-muted space-y-2">
                <div class="flex justify-between items-center text-gh-text mb-4">
                    <span x-text="progressMessage"></span>
                    <span x-text="progress + '%'"></span>
                </div>
                <div class="w-full bg-gh-border rounded-full h-1.5 overflow-hidden">
                    <div class="bg-gh-green h-1.5 rounded-full transition-all duration-300 ease-out"
                        :style="'width: ' + progress + '%'"></div>
                </div>
                <div class="pt-2 text-[11px] opacity-75" x-show="progress >= 50 && progress < 95">
                    > Running Gradle wrapper...
                </div>
            </div>
        </div>

    </div>

    <script>
        const API_URL = "http://localhost:9741";

        function htpkBuilder() {
            return {
                appId: "",
                appName: "",
                sourceType: "git",
                zipFile: null,
                distFiles: null,

                // Git specifics
                gitUrl: "",
                gitBranch: "",
                gitCommit: "",
                gitEntry: "",
                githubToken: "",
                liveApp: true,

                branches: [],
                isLoadingBranches: false,
                commits: [],
                isLoadingCommits: false,
                htmlFiles: [],
                isLoadingFiles: false,
                fetchTimeout: null,

                mainUrl: "",
                iconFile: null,
                iconFileName: ".PNG (ideally 512x512) or .SVG",
                iconPreview: null,
                building: false,
                progress: 0,
                progressMessage: "",
                status: "",
                statusType: "",
                eventSource: null,

                init() {
                    this.$nextTick(() => lucide.createIcons());
                    this.$watch('iconPreview', () => this.$nextTick(() => lucide.createIcons()));
                    this.$watch('gitUrl', () => {
                        this.debounceFetchData();
                        this.autoFillAppDetails();
                    });
                    this.$watch('githubToken', () => this.debounceFetchData());
                    this.$watch('liveApp', (val) => {
                        if (val) {
                            this.gitCommit = "";
                            this.fetchHtmlFiles();
                        }
                    });
                },

                debounceFetchData() {
                    clearTimeout(this.fetchTimeout);
                    this.fetchTimeout = setTimeout(() => {
                        this.fetchBranches();
                    }, 500);
                },

                getRepoInfo() {
                    if (!this.gitUrl) return null;
                    const match = this.gitUrl.match(/github\.com\/([^/]+)\/([^/.]+)/);
                    if (!match) return null;
                    return {
                        owner: match[1],
                        repo: match[2].replace('.git', '')
                    };
                },

                autoFillAppDetails() {
                    const repoInfo = this.getRepoInfo();
                    if (repoInfo) {
                        this.appName = repoInfo.repo;

                        let safeId = repoInfo.repo.toLowerCase().replace(/[^a-z0-9]/g, '_');
                        if (!/^[a-z]/.test(safeId)) {
                            safeId = 'app_' + safeId;
                        }
                        this.appId = safeId;
                    }
                },

                getHeaders() {
                    const headers = {};
                    if (this.githubToken) {
                        headers['Authorization'] = `token ${this.githubToken}`;
                    }
                    return headers;
                },

                async fetchBranches() {
                    const repoInfo = this.getRepoInfo();
                    if (!repoInfo) {
                        this.branches = [];
                        this.commits = [];
                        this.htmlFiles = [];
                        return;
                    }

                    this.isLoadingBranches = true;

                    try {
                        const response = await fetch(`https://api.github.com/repos/${repoInfo.owner}/${repoInfo.repo}/branches`, { headers: this.getHeaders() });
                        if (!response.ok) throw new Error();
                        const data = await response.json();

                        this.branches = data.map(b => b.name);

                        if (this.branches.includes('main')) this.gitBranch = 'main';
                        else if (this.branches.includes('master')) this.gitBranch = 'master';
                        else if (this.branches.length > 0) this.gitBranch = this.branches[0];

                    } catch (e) {
                        this.branches = [];
                    } finally {
                        this.isLoadingBranches = false;
                        this.fetchCommits();
                    }
                },

                async fetchCommits() {
                    const repoInfo = this.getRepoInfo();
                    if (!repoInfo || !this.gitBranch) {
                        this.commits = [];
                        this.htmlFiles = [];
                        return;
                    }

                    this.isLoadingCommits = true;
                    this.gitCommit = "";

                    try {
                        const response = await fetch(`https://api.github.com/repos/${repoInfo.owner}/${repoInfo.repo}/commits?sha=${this.gitBranch}&per_page=20`, { headers: this.getHeaders() });
                        if (!response.ok) throw new Error();
                        const data = await response.json();

                        this.commits = data.map(c => {
                            const firstLine = c.commit.message.split('\n')[0];
                            const shortMsg = firstLine.length > 45 ? firstLine.substring(0, 45) + '...' : firstLine;

                            return {
                                sha: c.sha,
                                shortSha: c.sha.substring(0, 7),
                                message: shortMsg
                            };
                        });

                    } catch (e) {
                        this.commits = [];
                    } finally {
                        this.isLoadingCommits = false;
                        this.fetchHtmlFiles();
                    }
                },

                async fetchHtmlFiles() {
                    const repoInfo = this.getRepoInfo();
                    if (!repoInfo || !this.gitBranch) {
                        this.htmlFiles = [];
                        return;
                    }

                    this.isLoadingFiles = true;
                    const targetSha = this.gitCommit || this.gitBranch;

                    try {
                        // Fetch entire git tree recursively
                        const response = await fetch(`https://api.github.com/repos/${repoInfo.owner}/${repoInfo.repo}/git/trees/${targetSha}?recursive=1`, { headers: this.getHeaders() });
                        if (!response.ok) throw new Error();
                        const data = await response.json();

                        // Filter for only HTML files
                        this.htmlFiles = data.tree
                            .filter(item => item.type === 'blob' && item.path.endsWith('.html'))
                            .map(item => item.path);

                        // Smart default selection
                        if (this.htmlFiles.includes('index.html')) {
                            this.gitEntry = 'index.html';
                        } else if (this.htmlFiles.length > 0) {
                            this.gitEntry = this.htmlFiles[0];
                        } else {
                            this.gitEntry = 'index.html'; // Fallback text default
                        }

                    } catch (e) {
                        this.htmlFiles = [];
                    } finally {
                        this.isLoadingFiles = false;
                    }
                },

                handleIconFile(e) {
                    const file = e.target.files[0];
                    if (!file) {
                        this.iconFile = null;
                        this.iconFileName = ".PNG (ideally 512x512) or .SVG";
                        this.iconPreview = null;
                        return;
                    }
                    this.iconFile = file;
                    this.iconFileName = file.name;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.iconPreview = e.target.result;
                    };
                    reader.readAsDataURL(file);
                },

                async submitBuild() {
                    if (this.sourceType === "dist") {
                        this.showError("Dist Folder build is not implemented in backend yet.");
                        return;
                    }

                    if (this.eventSource) {
                        this.eventSource.close();
                        this.eventSource = null;
                    }

                    this.building = true;
                    this.status = "";
                    this.progress = 0;
                    this.progressMessage = "Setting up job...";

                    const formData = new FormData();
                    formData.append("app_id", this.appId);
                    formData.append("name", this.appName);
                    formData.append("icon", this.iconFile);

                    if (this.sourceType === "file" && this.zipFile) {
                        formData.append("zip_file", this.zipFile);
                    } else if (this.sourceType === "git") {
                        formData.append("git_url", this.gitUrl);
                        formData.append("git_branch", this.gitBranch);
                        formData.append("git_entry", this.gitEntry);
                    } else if (this.sourceType === "url") {
                        formData.append("main_url", this.mainUrl);
                    }

                    try {
                        const response = await fetch(`${API_URL}/build-app`, {
                            method: "POST",
                            body: formData,
                        });

                        if (!response.ok) throw new Error(await response.text());
                        const result = await response.json();
                        this.connectProgress(result.build_id);
                    } catch (e) {
                        this.showError(e.message);
                    }
                },

                connectProgress(buildId) {
                    if (this.eventSource) {
                        this.eventSource.close();
                    }
                    this.eventSource = new EventSource(`${API_URL}/build-progress/${buildId}`);

                    this.eventSource.onmessage = (e) => {
                        const data = JSON.parse(e.data);
                        this.progress = data.progress;
                        this.progressMessage = data.message || data.status || "Processing...";
                    };

                    this.eventSource.addEventListener("complete", async (e) => {
                        this.eventSource.close();
                        const data = JSON.parse(e.data);
                        await this.downloadApk(data.build_id);
                    });

                    this.eventSource.addEventListener("error", (e) => {
                        this.eventSource.close();
                        if (e.data) {
                            const data = JSON.parse(e.data);
                            this.showError(data.error);
                        }
                    });
                },

                async downloadApk(buildId) {
                    try {
                        const response = await fetch(`${API_URL}/download-apk/${buildId}`);
                        if (!response.ok) throw new Error("Artifact download failed");

                        const blob = await response.blob();
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement("a");
                        a.href = url;
                        a.download = `${this.appId}.apk`;
                        a.click();
                        URL.revokeObjectURL(url);

                        this.status = "Build completed successfully. APK downloaded.";
                        this.statusType = "success";
                    } catch (e) {
                        this.showError(e.message);
                    }
                    this.building = false;
                },

                showError(msg) {
                    this.status = "Build Failed: " + msg;
                    this.statusType = "error";
                    this.building = false;
                }
            };
        }
    </script>
</body>
